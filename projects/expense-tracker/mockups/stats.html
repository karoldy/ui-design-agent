<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计 - 个人记账工具</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #FFFFFF;
      --color-surface: #F8F9FA;
      --color-border: #E8EAED;
      --color-text-primary: #1A1A2E;
      --color-text-secondary: #6B7280;
      --color-text-tertiary: #7B8794;

      --color-accent: #00A86B;
      --color-accent-soft: #E8F5E9;
      --color-accent-text: #007A4D;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 999px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 200ms;
      --duration-normal: 300ms;

      --color-dining: #FF6B6B;
      --color-transport: #4ECDC4;
      --color-shopping: #A8E6CF;
      --color-housing: #FFD93D;
      --color-entertainment: #6C5CE7;
      --color-other: #B0B0B0;
    }

    body {
      background: #DEE1E6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 375px;
      height: 812px;
      background: var(--color-bg);
      border-radius: 44px;
      box-shadow: 0 0 0 6px #1C1C1E, 0 12px 60px rgba(0,0,0,0.25);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #1C1C1E;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }

    .status-bar {
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 28px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-primary);
      background: var(--color-bg);
      flex-shrink: 0;
    }
    .status-bar .time { font-weight: 700; }
    .status-bar .icons { display: flex; gap: 4px; font-size: 11px; }

    /* ===== Native Nav Bar Placeholder ===== */
    .nav-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      border-bottom: 0.5px solid var(--color-border);
      flex-shrink: 0;
    }
    .nav-bar .nav-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-content::-webkit-scrollbar { width: 0; }

    /* ===== Month Switcher ===== */
    .month-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-5);
      padding: var(--space-3) var(--space-5);
      flex-shrink: 0;
    }
    .month-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background var(--duration-fast) var(--ease-out);
      user-select: none;
    }
    .month-arrow:active { background: var(--color-surface); }
    .month-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--color-text-primary);
      min-width: 110px;
      text-align: center;
    }

    /* ===== Monthly Summary ===== */
    .monthly-summary {
      padding: var(--space-1) var(--space-5) var(--space-4);
      text-align: center;
    }
    .total-expense {
      font-size: 32px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }
    .total-expense .label {
      font-size: 13px;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-right: 6px;
    }
    .daily-avg {
      font-size: 13px;
      color: var(--color-text-tertiary);
      margin-top: var(--space-1);
    }

    /* ===== Section ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5) var(--space-3);
    }
    .section-header .title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .section-header .subtitle {
      font-size: 12px;
      color: var(--color-text-tertiary);
    }

    /* ===== Pie Section ===== */
    .pie-section {
      padding: var(--space-2) var(--space-5) var(--space-5);
    }
    .pie-container {
      display: flex;
      align-items: center;
      gap: var(--space-5);
    }
    .donut-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      flex-shrink: 0;
    }
    .donut-wrapper svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .donut-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .donut-center .center-amount {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      font-variant-numeric: tabular-nums;
    }
    .donut-center .center-label {
      font-size: 10px;
      color: var(--color-text-tertiary);
      margin-top: 1px;
    }

    .pie-labels {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .pie-label-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 13px;
      color: var(--color-text-primary);
    }
    .pie-label-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pie-label-item .pct {
      margin-left: auto;
      color: var(--color-text-secondary);
      font-weight: 500;
      font-size: 12px;
    }

    /* ===== Ranking Section ===== */
    .ranking-section {
      padding: var(--space-1) var(--space-5) var(--space-5);
    }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }
    .ranking-item:last-child { margin-bottom: 0; }
    .ranking-emoji {
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .ranking-emoji .mdi {
      font-size: 18px;
      color: var(--color-text-secondary);
    }
    .ranking-name {
      font-size: 13px;
      color: var(--color-text-primary);
      width: 32px;
      flex-shrink: 0;
    }
    .ranking-bar-bg {
      flex: 1;
      height: 20px;
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
    }
    .ranking-bar-fill {
      height: 100%;
      border-radius: var(--radius-sm);
      transition: width var(--duration-normal) var(--ease-out);
    }
    .ranking-amount {
      font-size: 13px;
      color: var(--color-text-primary);
      width: 64px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      font-weight: 500;
    }

    /* ===== Trend Section ===== */
    .trend-section {
      padding: var(--space-1) var(--space-5) var(--space-6);
    }
    .segmented-control {
      display: flex;
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      padding: 2px;
      width: fit-content;
      margin-bottom: var(--space-4);
    }
    .seg-item {
      padding: 4px 18px;
      font-size: 13px;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: 4px;
      transition: all var(--duration-fast) var(--ease-out);
      user-select: none;
    }
    .seg-item.active {
      background: var(--color-accent);
      color: var(--color-bg);
      font-weight: 500;
    }

    .line-chart-container {
      width: 100%;
      height: 150px;
      position: relative;
    }
    .line-chart-container svg {
      width: 100%;
      height: 100%;
    }
    .line-chart-container .grid-line {
      stroke: var(--color-border);
      stroke-width: 1;
      stroke-dasharray: 4,4;
    }
    .line-chart-container .avg-line {
      stroke: var(--color-accent);
      stroke-width: 1;
      stroke-dasharray: 6,4;
      opacity: 0.5;
    }
    .line-chart-container .avg-label {
      font-size: 9px;
      fill: var(--color-accent);
    }
    .line-chart-container .data-line {
      fill: none;
      stroke: var(--color-text-primary);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .line-chart-container .data-area {
      fill: url(#areaGrad);
      opacity: 0.15;
    }
    .line-chart-container .data-point {
      fill: var(--color-bg);
      stroke: var(--color-text-primary);
      stroke-width: 2.5;
    }
    .line-chart-container .data-point:hover {
      r: 5;
    }

    .day-labels {
      display: flex;
      justify-content: space-around;
      margin-top: var(--space-2);
      padding: 0 var(--space-2);
    }
    .day-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-4);
      gap: var(--space-4);
      flex: 1;
    }
    .empty-state.visible { display: flex; }
    .empty-state .empty-illustration {
      width: 120px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
    }
    .empty-state .empty-illustration .mdi {
      font-size: 56px;
    }
    .empty-state .empty-text {
      font-size: 15px;
      color: var(--color-text-tertiary);
      text-align: center;
      line-height: 1.6;
    }
    .empty-state .empty-btn {
      display: inline-block;
      padding: var(--space-2) var(--space-6);
      background: var(--color-accent);
      color: var(--color-bg);
      border-radius: var(--radius-full);
      font-size: 14px;
      text-decoration: none;
      font-weight: 500;
    }
    .empty-state .empty-btn:active {
      background: #008F5A;
    }

    /* ===== Loading Skeleton ===== */
    .skeleton-state {
      display: none;
      flex-direction: column;
      padding: var(--space-5);
      gap: var(--space-4);
      flex: 1;
    }
    .skeleton-state.visible { display: flex; }
    .skeleton-block {
      background: linear-gradient(90deg, var(--color-surface) 25%, #ECEDF0 50%, var(--color-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-month { width: 140px; height: 24px; align-self: center; }
    .skeleton-total { width: 180px; height: 40px; align-self: center; }
    .skeleton-donut { width: 150px; height: 150px; border-radius: 50%; align-self: center; }
    .skeleton-row { width: 100%; height: 20px; }

    /* ===== Tab Bar ===== */
    .tab-bar {
      height: 50px;
      display: flex;
      align-items: stretch;
      border-top: 1px solid var(--color-border);
      background: var(--color-bg);
      flex-shrink: 0;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-decoration: none;
      color: var(--color-text-tertiary);
      font-size: 10px;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .tab-item.active { color: var(--color-accent-text); }
    .tab-item .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .tab-item .tab-icon .mdi { font-size: 22px; color: var(--color-text-tertiary); transition: color var(--duration-fast) var(--ease-out); }
    .tab-item.active .tab-icon .mdi { color: var(--color-accent); }
    .tab-item .tab-label { font-size: 9px; line-height: 1; font-weight: 400; }
    .tab-item.active .tab-label { font-weight: 500; }

    .safe-area {
      height: 34px;
      background: var(--color-bg);
      flex-shrink: 0;
    }

    /* ===== State Controls ===== */
    .controls {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.95);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(8px);
    }
    .controls .title {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-right: 4px;
      line-height: 26px;
    }
    .controls button {
      padding: 4px 12px;
      font-size: 11px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .controls button.active {
      background: var(--color-accent);
      color: var(--color-bg);
      border-color: var(--color-accent);
    }

    @media (max-height: 860px) { .phone { transform: scale(0.85); } }
    @media (max-height: 740px) { .phone { transform: scale(0.7); } }
    @media (max-width: 420px) {
      .phone { transform: scale(0.9); transform-origin: center center; }
      .controls { top: 8px; padding: 4px 10px; }
      .controls button { padding: 3px 8px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- State Controls -->
  <div class="controls">
    <span class="title">状态切换</span>
    <button id="state-data" class="active">有数据</button>
    <button id="state-loading">加载中</button>
    <button id="state-empty">空状态</button>
  </div>

  <!-- Phone Frame -->
  <div class="phone">
    <div class="screen">

      <!-- Notch -->
      <div class="notch"></div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">9:41</span>
        <span class="icons">
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
            <rect x="0.5" y="0.5" width="14" height="10" rx="2" stroke="#1A1A2E" stroke-opacity="0.4"/>
            <rect x="11" y="3" width="3" height="5" rx="0.5" fill="#1A1A2E" fill-opacity="0.4"/>
          </svg>
          <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
            <rect x="0.5" y="0.5" width="15" height="10" rx="1.5" stroke="#1A1A2E" stroke-opacity="0.6"/>
            <rect x="2.5" y="2.5" width="11" height="6" rx="0.5" fill="#1A1A2E" fill-opacity="0.6"/>
          </svg>
        </span>
      </div>

      <!-- Nav Bar (WeChat Native) -->
      <div class="nav-bar">
        <span class="nav-title">统计</span>
      </div>

      <!-- Scrollable Content -->
      <div class="scroll-content" id="scrollContent">

        <!-- Data Content -->
        <div id="dataContent">

          <!-- Month Switcher -->
          <div class="month-switcher">
            <div class="month-arrow" id="monthPrev">&#8249;</div>
            <div class="month-title" id="monthTitle">2026年7月</div>
            <div class="month-arrow" id="monthNext">&#8250;</div>
          </div>

          <!-- Monthly Summary -->
          <div class="monthly-summary">
            <div class="total-expense">
              <span class="label">本月支出</span>
              <span>¥3,280.50</span>
            </div>
            <div class="daily-avg">日均 ¥108.52</div>
          </div>

          <!-- Pie Chart Section -->
          <div class="section-header">
            <span class="title">支出分布</span>
          </div>
          <div class="pie-section">
            <div class="pie-container">
              <div class="donut-wrapper">
                <svg viewBox="0 0 150 150">
                  <!-- Defs for stroke-dasharray donut -->
                  <circle cx="75" cy="75" r="54"

                  <!-- 餐饮 35% -->

                    fill="none" stroke="#6C5CE7" stroke-width="28"

                    stroke-dashoffset="-308.756"

                </svg>
                <div class="donut-center">
                  <div class="center-amount">¥3,280</div>
                  <div class="center-label">总支出</div>
                </div>
              </div>
              <div class="pie-labels">
                <div class="pie-label-item">
                  <span class="dot" style="background:#FF6B6B;"></span>

          <!-- Category Ranking Top5 -->

          <div class="ranking-section">

              </div>
              <span class="ranking-amount">&#165;1,148</span>
            </div>
            <div class="ranking-item">
              <span class="ranking-emoji"><i class="mdi mdi-home"></i></span>
              <span class="ranking-name">居住</span>
              <div class="ranking-bar-bg">
                <div class="ranking-bar-fill" style="width:71%; background:#FFD93D;"></div>
              </div>
              <span class="ranking-amount">&#165;820</span>
            </div>
            <div class="ranking-item">
              <span class="ranking-emoji"><i class="mdi mdi-bus"></i></span>
              <span class="ranking-name">交通</span>
              <div class="ranking-bar-bg">
                <div class="ranking-bar-fill" style="width:51%; background:#4ECDC4;"></div>
              </div>

            </div>
            <div class="ranking-item">
              <span class="ranking-emoji"><i class="mdi mdi-shopping"></i></span>
              <span class="ranking-name">购物</span>
              <div class="ranking-bar-bg">
                <div class="ranking-bar-fill" style="width:37%; background:#A8E6CF;"></div>
              </div>
              <span class="ranking-amount">&#165;426</span>
            </div>

              <span class="ranking-emoji"><i class="mdi mdi-gamepad-variant"></i></span>
              <span class="ranking-name">娱乐</span>
              <div class="ranking-bar-bg">
                <div class="ranking-bar-fill" style="width:26%; background:#6C5CE7;"></div>
              </div>
              <span class="ranking-amount">&#165;296</span>
            </div>
          </div>

          <!-- Trend Section -->
          <div class="section-header">
            <span class="title">消费趋势</span>
          </div>
          <div class="trend-section">
            <div class="segmented-control">
              <div class="seg-item" data-period="week">周</div>
              <div class="seg-item active" data-period="month">月</div>
            </div>
            <div class="line-chart-container">

  <script>
    const stateDataBtn = document.getElementById('state-data');
    const stateLoadingBtn = document.getElementById('state-loading');
    const stateEmptyBtn = document.getElementById('state-empty');
    const dataContent = document.getElementById('dataContent');
    const skeletonState = document.getElementById('skeletonState');
    const emptyState = document.getElementById('emptyState');

    function setState(state) {
      stateDataBtn.classList.toggle('active', state === 'data');
      stateLoadingBtn.classList.toggle('active', state === 'loading');
      stateEmptyBtn.classList.toggle('active', state === 'empty');

      dataContent.style.display = 'none';
      skeletonState.classList.remove('visible');
      emptyState.classList.remove('visible');

      if (state === 'data') {
        dataContent.style.display = 'block';
      } else if (state === 'loading') {
        skeletonState.classList.add('visible');
      } else {
        emptyState.classList.add('visible');
      }
    }

    stateDataBtn.addEventListener('click', () => setState('data'));
    stateLoadingBtn.addEventListener('click', () => setState('loading'));
    stateEmptyBtn.addEventListener('click', () => setState('empty'));

    // Month switcher
    const monthTitle = document.getElementById('monthTitle');
    const monthPrev = document.getElementById('monthPrev');
    const monthNext = document.getElementById('monthNext');
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    let currentMonth = 6; // July (0-indexed)
    let currentYear = 2026;

    function updateMonth() {
      monthTitle.textContent = currentYear + '年' + months[currentMonth];
    }

    monthPrev.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      updateMonth();
    });

    monthNext.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      updateMonth();
    });

    // Segmented control
    document.querySelectorAll('.seg-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.seg-item').forEach(s => s.classList.remove('active'));
        this.classList.add('active');
      });
    });

    setState('data');
  </script>
